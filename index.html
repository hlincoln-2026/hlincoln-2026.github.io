<!DOCTYPE html>
<html>
  <head>
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Boxicons CSS -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Welcome Message -->

    <div id="home" class="welcome">
      <img
        src="/images/blurred_purple_background.jpeg"
        alt=""
        class="background"
      />
      <h1 class="welcome-msg">Hello, welcome to my website!</h1>
    </div>

    <!-- Potfolio Section -->

    <div>
      <h2 id="portfolio" class="title">Portfolio</h2>
      <div class="port-container">
        <div class="cards port-element">
          <h3 class="port-title">Card Game (Aces High)</h3>
          <img src="/images/cards.jpeg" alt="" class="port-img" />
        </div>
        <div class="flying port-element">
          <h3 class="port-title">Safe Flying Conditions</h3>
          <img src="/images/flying.jpeg" alt="" class="port-img" />
        </div>
        <div class="school-links port-element">
          <h3 class="port-title">School Links</h3>
          <img src="/images/cards.jpeg" alt="" class="port-img" />
        </div>
        

      


      
      
    </div>

    <!-- About Section -->

    <div class="about">
      <h2 id="about" class="title">About</h2>
      <img src="/images/IMG_2138.jpeg" alt="" class="about-img" />
    </div>

    <!-- Resume Section -->

    <div>
      <h2 id="resume" class="title">Resume</h2>
    </div>

    <!-- Contact Section -->

    <div>
      <h2 id="contact" class="title">Contact</h2>
    </div>

    <!-- Navigation and Sidebar -->

    <nav>
      <div class="logo">
        <i class="bx bx-menu menu-icon"></i>
        <span class="logo-name">Hunter Lincoln</span>
      </div>

      <div class="sidebar">
        <div class="logo">
          <i class="bx bx-menu menu-icon"></i>
          <span class="logo-name">Hunter Lincoln</span>
        </div>
        <div class="sidebar-content">
          <ul class="lists">
            <li class="list">
              <a href="#" class="nav-link">
                <i class="bx bx-home icon"></i>
                <span class="link">Dashboard</span>
              </a>
            </li>
            <li class="list">
              <a href="#portfolio" class="nav-link">
                <i class="bx bx-code-block icon"></i>
                <span class="link">Projects</span>
              </a>
            </li>
            <li class="list">
              <a href="#about" class="nav-link">
                <i class="bx bx-user icon"></i>
                <span class="link">About</span>
              </a>
            </li>
            <li class="list">
              <a href="#resume" class="nav-link">
                <i class="bx bx-paperclip icon"></i>
                <span class="link">Experience</span>
              </a>
            </li>
            <li class="list">
              <a href="#contact" class="nav-link">
                <i class="bx bxs-contact icon"></i>
                <span class="link">Contact</span>
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="overlay"></section>

    <!-- Footer -->
    <div class="footer">
      <ul class="contributes">
        Color Design:
        <li class="cont-name">
          <a
            class="link"
            href="https://www.linkedin.com/in/hayley-vedders-497403264/"
            >Hayley Vedders</a
          >
        </li>
        <li class="cont-name">
          <a
            class="link"
            href="https://www.linkedin.com/in/olivia-austin-796331205/"
            >Olivia Austin</a
          >
        </li>
        <li class="cont-name">Katelyn McCorry</li>
      </ul>
    </div>

    <!-- Scripts -->
    <script>
      const navBar = document.querySelector("nav"),
        menuBtns = document.querySelectorAll(".menu-icon"),
        overlay = document.querySelector(".overlay");

      menuBtns.forEach((menuBtns) => {
        menuBtns.addEventListener("click", () => {
          navBar.classList.toggle("open");
        });
      });

      overlay.addEventListener("click", () => {
        navBar.classList.remove("open");
      });
    </script>
  </body>
</html>
